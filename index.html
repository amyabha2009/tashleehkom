<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تشليحكم</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
font-family:Tahoma;
text-align:center;
padding-top:120px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

h2{
color:#38bdf8;
font-size:28px;
margin-bottom:50px;
}

#countdown{
font-size:40px;
background:#1e293b;
display:inline-block;
padding:25px 50px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

span{
margin:10px;
}

</style>

</head>

<body>

<h1>تشليحكم برعاية عبدالرحمن عبشان</h1>
<h2>🚀 استعدوا للإنطلاق</h2>

<div id="countdown">
<span id="days"></span> يوم
<span id="hours"></span> ساعة
<span id="minutes"></span> دقيقة
<span id="seconds"></span> ثانية
</div>

<script>

var launchDate = new Date("Apr 1, 2026 00:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = launchDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
var seconds = Math.floor((distance % (1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if(distance < 0){
document.getElementById("countdown").innerHTML = "🚀 تم الإنطلاق";
}

},1000);

</script>

</body>
</html>
